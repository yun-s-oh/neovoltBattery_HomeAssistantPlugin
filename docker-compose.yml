services:
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ./config:/config
      - ./custom_components:/config/custom_components
    environment:
      - TZ=Australia/Sydney
    ports:
      - "8123:8123"
    restart: unless-stopped
    network_mode: bridge
